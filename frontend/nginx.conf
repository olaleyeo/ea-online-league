server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: proxy API requests if running in same container (not used here, but good for single-container setups)
    # location /api/ {
    #     proxy_pass http://backend:3001/api/;
    # }
}
