version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      args:
        # VITE_API_URL should point to the backend service. In a real deployment, this would be a public URL.
        # For local docker-compose testing, we'll proxy it through nginx or use localhost if running locally.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      # Pass through environment variables from the host
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
    restart: unless-stopped
