apiVersion: apps/v1
kind: Deployment
metadata:
  name: ea-league-backend
  labels:
    app: ea-league
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ea-league
      tier: backend
  template:
    metadata:
      labels:
        app: ea-league
        tier: backend
    spec:
      containers:
      - name: backend
        image: your-registry/ea-league-backend:latest
        ports:
        - containerPort: 3001
        envFrom:
        - secretRef:
            name: ea-league-secrets
        - configMapRef:
            name: ea-league-config
        livenessProbe:
          httpGet:
            path: /api/tournaments
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/tournaments
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ea-league-frontend
  labels:
    app: ea-league
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ea-league
      tier: frontend
  template:
    metadata:
      labels:
        app: ea-league
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: your-registry/ea-league-frontend:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: ea-league-config
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 20
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
