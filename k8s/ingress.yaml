apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ea-league-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - app.ealeague.com
    secretName: ea-league-tls
  rules:
  - host: app.ealeague.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ea-league-backend-svc
            port:
              number: 3001
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ea-league-frontend-svc
            port:
              number: 80
